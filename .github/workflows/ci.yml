name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      # Deliberately NOT running test:contract here -- it hits live upstream
      # APIs, which would make this required per-push check flaky for
      # reasons unrelated to the change being reviewed. See
      # .github/workflows/contract.yml (scheduled + manual dispatch) and
      # local-city-mcp-template's STANDARD.md section 6.
